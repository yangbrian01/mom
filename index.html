<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom's 2026 Jubilee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <style>
    :root {
      --primary: #4a3728; /* 深咖啡：像樂器的木紋 */
      --accent: #c9a050;  /* 霧金：像管樂器的黃銅 */
      --bg: #f9f7f2;      /* 米色紙張質感 */
    }
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      background-color: var(--bg);
      color: var(--primary);
    }
    .serif { font-family: 'Noto Serif TC', serif; }
    
    /* 玻璃擬態加強版 */
    .glass-card { 
      background: rgba(255, 255, 255, 0.6); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(74, 55, 40, 0.05);
    }

    /* 自定義地圖樣式 */
    #map { 
      height: 450px; 
      border-radius: 2px; /* 方正比圓角更有雜誌感 */
      filter: sepia(20%) contrast(90%); /* 讓地圖自帶復古濾鏡 */
    }

    /* 偽裝成指揮棒的載入條 */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 3px;
      background: var(--accent); z-index: 9999; transform-origin: left;
    }
    
    /* 自定義按鈕動畫 */
    .btn-premium {
      position: relative; overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-premium:after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent); transform: scaleX(0); transition: 0.3s;
    }
    .btn-premium:hover:after { transform: scaleX(1); }
  </style>
</head>
<body class="overflow-x-hidden">

  <div id="loader"></div>

  <div class="max-w-2xl mx-auto px-8 py-20">
    
    <header class="mb-24 text-center">
      <div class="inline-block border-y border-stone-300 py-4 px-12 mb-8">
        <h1 class="serif text-4xl tracking-[0.2em] font-bold uppercase">The Jubilee</h1>
      </div>
      <p class="serif italic text-stone-500 tracking-widest">致 守護溫暖的妳 ・ 2026.04.06</p>
    </header>

    <section class="mb-32">
      <div class="flex items-baseline justify-between mb-8">
        <h2 class="serif text-2xl font-bold italic">Chapter I. <span class="not-italic ml-2">足跡回響</span></h2>
        <div class="h-px flex-1 bg-stone-200 mx-4"></div>
      </div>
      <div id="map" class="mb-6"></div>
      <p class="text-xs text-stone-400 text-right uppercase tracking-tighter italic">Interactive Map / Memoires System v2.0</p>
    </section>

    <section class="mb-20">
      <div class="flex items-baseline justify-between mb-12">
        <h2 class="serif text-2xl font-bold italic">Chapter II. <span class="not-italic ml-2">皇家管家</span></h2>
        <div class="h-px flex-1 bg-stone-200 mx-4"></div>
      </div>
      
      <div id="service-list" class="space-y-12">
        </div>
    </section>

    <footer class="mt-40 pt-10 border-t border-stone-200 text-center opacity-30">
      <p class="serif text-sm">Designed & Conducted by Your Son</p>
    </footer>
  </div>

  <div id="modal" class="fixed inset-0 bg-[#f9f7f2] hidden z-[2000] flex flex-col items-center justify-center p-10 overflow-y-auto">
    <div class="max-w-xl w-full text-center">
      <img id="modal-img" src="" class="w-full h-[50vh] object-cover mb-10 grayscale-[30%] hover:grayscale-0 transition-all duration-700">
      <div class="h-10 w-px bg-stone-300 mx-auto mb-10"></div>
      <p id="modal-text" class="serif text-xl leading-relaxed text-stone-700 mb-16 px-4"></p>
      <button onclick="closeModal()" class="serif text-sm uppercase tracking-[0.3em] border-b border-stone-400 pb-2 hover:text-amber-600">Close Gallery</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';

    let map;
    window.onload = () => {
      // 模擬加載進度
      gsap.to("#loader", { scaleX: 1, duration: 1.5, ease: "power4.inOut", onComplete: () => {
        gsap.to("#loader", { opacity: 0 });
      }});

      map = L.map('map', { zoomControl: false, scrollWheelZoom: false }).setView([24.81, 121.03], 7);
      // 使用更乾淨的地圖底圖 (Stamen Toner 或 CartoDB Positron)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
      fetchData();
    };

    async function fetchData() {
      const resp = await fetch(`${GAS_URL}?action=getData`);
      const data = await resp.json();
      renderMap(data.memories);
      renderServices(data.services);
    }

    function renderMap(memories) {
      memories.forEach(m => {
        // 自定義 Icon 質感
        const customIcon = L.divIcon({
          className: 'custom-div-icon',
          html: `<div style="background-color: #c9a050; width: 10px; height: 10px; border-radius: 50%; border: 2px solid white;"></div>`,
          iconSize: [10, 10],
          iconAnchor: [5, 5]
        });

        L.marker([m[1], m[2]], {icon: customIcon}).addTo(map)
          .on('click', () => {
            gsap.fromTo("#modal", { opacity: 0, y: 50 }, { display: 'flex', opacity: 1, y: 0, duration: 0.8, ease: "power4.out" });
            document.getElementById('modal-img').src = m[4];
            document.getElementById('modal-text').innerText = m[3];
          });
      });
    }

    function renderServices(services) {
      const list = document.getElementById('service-list');
      list.innerHTML = services.map((s, index) => `
        <div class="service-item group flex items-start gap-8 py-4 opacity-0">
          <span class="serif text-stone-300 text-3xl font-light">0${index + 1}</span>
          <div class="flex-1">
            <h3 class="serif text-xl font-bold mb-2 group-hover:text-amber-700 transition-colors">${s[1]}</h3>
            <p class="text-stone-400 text-sm leading-loose mb-4">${s[2]}</p>
            <div class="flex items-center gap-4">
              <button onclick="redeem('${s[0]}')" 
                class="btn-premium serif text-xs uppercase tracking-widest text-stone-600 py-1">
                ${s[4] > 0 ? 'Request Service' : 'Out of Stock'}
              </button>
              <span class="text-[10px] text-stone-300">Remaining: ${s[4]}</span>
            </div>
          </div>
        </div>
      `).join('');

      // 列表進場動畫
      gsap.to(".service-item", { opacity: 1, x: 0, stagger: 0.2, duration: 1, delay: 0.5 });
    }

    async function redeem(id) {
      if (!confirm('確認向管家發送請求？')) return;
      const resp = await fetch(`${GAS_URL}?action=redeem&id=${id}`);
      const result = await resp.text();
      if (result === 'SUCCESS') {
        alert('請求已發送至兒子的 Line。');
        fetchData();
      }
    }

    function closeModal() { 
      gsap.to("#modal", { opacity: 0, y: 50, duration: 0.5, onComplete: () => {
        document.getElementById('modal').style.display = 'none';
      }});
    }
  </script>
</body>
</html>
