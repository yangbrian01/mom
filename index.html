<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom's Birthday Journey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: #fff5f5; }
    .ghibli-font { font-family: 'Zhi Mang Xing', cursive; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-filter: blur(8px); 
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
    }
    #map { height: 350px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .custom-marker { filter: drop-shadow(0 0 5px #f472b6); }
    /* 下載你的貓頭鷹貼圖放在跟 index.html 同層 */
    .owl-float { animation: floating 3s ease-in-out infinite; }
    @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body class="pb-12">

  <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20 pointer-events-none">
    <div class="absolute top-10 left-10 w-32 h-32 bg-pink-300 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-40 h-40 bg-blue-200 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-md mx-auto px-6">
    <header class="pt-12 pb-8 text-center animate__animated animate__fadeInDown">
      <h1 class="ghibli-font text-5xl text-pink-500 mb-2">生日快樂</h1>
      <p class="text-gray-400 tracking-widest text-sm">2026.04.06 Special Edition</p>
      <div class="mt-4 owl-float text-4xl">🦉</div>
    </header>

    <section class="mb-10 animate__animated animate__fadeIn">
      <div class="flex justify-between items-end mb-4">
        <h2 class="text-xl font-bold text-gray-700">📍 時光旅行地圖</h2>
        <span class="text-xs text-pink-400">點擊標記喚起回憶</span>
      </div>
      <div id="map"></div>
    </section>

    <section class="animate__animated animate__fadeInUp">
      <h2 class="text-xl font-bold text-gray-700 mb-4">🛎️ 皇家管家服務</h2>
      <div id="service-list" class="grid gap-4">
        </div>
    </section>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[2000] flex items-center justify-center p-8" onclick="closeModal()">
    <div class="glass-card p-4 w-full max-w-sm animate__animated animate__zoomIn" onclick="event.stopPropagation()">
      <img id="modal-img" src="" class="w-full h-64 object-cover rounded-xl mb-4 shadow-inner">
      <p id="modal-text" class="text-gray-600 leading-relaxed italic text-center"></p>
      <button onclick="closeModal()" class="mt-6 w-full py-3 bg-pink-400 text-white rounded-xl shadow-lg">看完了，暖暖的 ❤️</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GAS_URL = '你的_GAS_網頁應用程式網址'; // 記得替換這個！

    let map;
    window.onload = () => {
      map = L.map('map', { zoomControl: false }).setView([24.81, 121.03], 8); // 竹北起始
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
      fetchData();
    };

    async function fetchData() {
      const resp = await fetch(`${GAS_URL}?action=getData`);
      const data = await resp.json();
      renderMap(data.memories);
      renderServices(data.services);
    }

    function renderMap(memories) {
      memories.forEach(m => {
        L.marker([m[1], m[2]]).addTo(map)
          .on('click', () => {
            document.getElementById('modal-img').src = m[4];
            document.getElementById('modal-text').innerText = m[3];
            document.getElementById('modal').classList.remove('hidden');
          });
      });
    }

    function renderServices(services) {
      const list = document.getElementById('service-list');
      list.innerHTML = services.map(s => `
        <div class="glass-card p-5 flex justify-between items-center transition-all hover:scale-[1.02] active:scale-95">
          <div class="flex-1">
            <h3 class="font-bold text-gray-800 text-lg">${s[1]}</h3>
            <p class="text-sm text-gray-400">${s[2]}</p>
            <div class="mt-2 flex gap-2">
              <span class="px-2 py-0.5 bg-pink-100 text-pink-500 text-[10px] rounded-full font-bold">剩餘 ${s[4]} 次</span>
            </div>
          </div>
          <button onclick="redeem('${s[0]}')" 
            class="${s[4] > 0 ? 'bg-pink-500 shadow-pink-200' : 'bg-gray-300'} text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center transition-colors">
            ${s[4] > 0 ? '🎁' : '❌'}
          </button>
        </div>
      `).join('');
    }

    async function redeem(id) {
      if (!confirm('確定要召喚管家（兒子）執行服務嗎？')) return;
      const resp = await fetch(`${GAS_URL}?action=redeem&id=${id}`);
      const result = await resp.text();
      if (result === 'SUCCESS') {
        alert('召喚成功！我收到通知囉，馬上來！');
        fetchData();
      } else {
        alert('這項服務次數用完囉～');
      }
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  </script>
</body>
</html>
