<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MOM'S JUBILEE | Spatial OS</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root { --glass-bg: rgba(255, 255, 255, 0.12); --glass-border: rgba(255, 255, 255, 0.15); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #000; color: #fff; overflow: hidden; margin: 0; }
    
    /* 極光背景 */
    .aurora-bg {
      position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, #4f46e5 0%, transparent 40%), radial-gradient(circle at 80% 20%, #f43f5e 0%, transparent 40%), radial-gradient(circle at 20% 80%, #0ea5e9 0%, transparent 40%);
      filter: blur(80px) saturate(150%); animation: aurora 20s linear infinite alternate; z-index: -2; opacity: 0.5;
    }
    @keyframes aurora { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(360deg) scale(1.2); } }

    /* 全螢幕地圖樣式 */
    #map-view { position: absolute; inset: 0; z-index: 10; display: none; }
    #map-view.active { display: block; }
    #leaflet-map { height: 100%; width: 100%; }

    /* 空間玻璃卡片 */
    .spatial-glass { background: var(--glass-bg); backdrop-filter: blur(40px) saturate(200%); border: 1px solid var(--glass-border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    
    /* 底部導航 */
    .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; padding: 10px; border-radius: 32px; z-index: 1000; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .dock-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.5); }
    .dock-btn.active { background: rgba(255,255,255,0.2); color: #fff; transform: scale(1.1); }

    /* 頁面切換 */
    .view { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: 0.5s; overflow-y: auto; padding-bottom: 120px; }
    .view.active { opacity: 1; pointer-events: auto; }

    /* Gacha 盲盒 */
    #gacha-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 3000; display: none; flex-direction: column; items-center; justify-content: center; text-center; }
    
    /* 客製化紅色標籤 */
    .red-pin { filter: hue-rotate(140deg); } /* 將預設藍色標籤轉為紅色系 */

    /* 票券樣式 */
    .wallet-pass { background: #fff; color: #000; border-radius: 20px; padding: 24px; position: relative; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <div class="aurora-bg"></div>

  <div id="gacha-overlay">
    <div id="gacha-cube" class="w-32 h-32 rounded-3xl spatial-glass flex items-center justify-center text-6xl border border-yellow-400/50">🐒</div>
    <h2 id="gacha-result" class="text-3xl font-bold mt-10 text-white opacity-0"></h2>
    <button class="mt-10 px-8 py-3 spatial-glass rounded-full text-sm font-bold uppercase tracking-widest" onclick="location.reload()">收下禮物</button>
  </div>

  <main id="view-home" class="view active px-6 pt-16">
    <header class="mb-10">
      <h2 class="text-white/40 text-xs font-bold tracking-[0.3em] uppercase mb-1">Station 0406</h2>
      <h1 class="text-5xl font-bold">Mom, HBD.</h1>
    </header>

    <div class="spatial-glass rounded-[32px] p-8 mb-6" onclick="requestMotionPermission()">
      <div class="flex items-center gap-5">
        <div class="w-14 h-14 rounded-full bg-indigo-500 flex items-center justify-center text-2xl shadow-lg shadow-indigo-500/50">🎶</div>
        <div>
            <h3 class="font-bold text-lg">體感指揮家</h3>
            <p id="motion-status" class="text-[10px] text-white/50 tracking-widest uppercase">點擊啟動陀螺儀</p>
        </div>
      </div>
    </div>

    <div class="spatial-glass rounded-[32px] p-6 mb-6 flex items-center justify-between" onclick="startGacha()">
        <div>
            <h3 class="font-bold text-lg">靈猴驚喜盲盒</h3>
            <p class="text-[10px] text-white/40 tracking-widest uppercase mt-1">Gacha System</p>
        </div>
        <div class="text-3xl">🎁</div>
    </div>

    <div class="spatial-glass rounded-[32px] p-6">
      <div class="flex gap-4 items-center mb-6">
        <div class="text-3xl bg-white/5 p-3 rounded-2xl">🦉</div>
        <h3 class="font-bold">管家快速指令</h3>
      </div>
      <div class="grid grid-cols-2 gap-3">
          <button onclick="sos('肚子餓了')" class="bg-white/5 py-3 rounded-xl text-xs font-bold active:bg-white/20 transition-all">🍱 我餓了</button>
          <button onclick="sos('想喝飲料')" class="bg-white/5 py-3 rounded-xl text-xs font-bold active:bg-white/20 transition-all">🥤 喝飲料</button>
          <button onclick="sos('按摩支援')" class="bg-white/5 py-3 rounded-xl text-xs font-bold active:bg-white/20 transition-all">💆‍♀️ 按摩</button>
          <button onclick="sos('召喚兒子')" class="bg-white/5 py-3 rounded-xl text-xs font-bold active:bg-white/20 transition-all">👦 找兒子</button>
      </div>
    </div>
  </main>

  <main id="view-map" class="view">
    <div id="leaflet-map"></div>
  </main>

  <main id="view-wallet" class="view px-6 pt-16">
    <h2 class="text-3xl font-bold mb-8">皇家兌換券</h2>
    <div id="service-list" class="space-y-4"></div>
  </main>

  <nav class="dock">
    <div class="dock-btn active" onclick="switchView('home', this)">🏠</div>
    <div class="dock-btn" onclick="switchView('map', this)">📍</div>
    <div class="dock-btn" onclick="switchView('wallet', this)">🎫</div>
  </nav>

  <audio id="bgm" src="你的音樂網址" loop></audio>

  <script>
    const GAS = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';
    let map, audio = document.getElementById('bgm');

    // 1. 初始化地圖 (核心回歸)
    function initMap() {
      map = L.map('leaflet-map', { zoomControl: false }).setView([35.0, 135.7], 5);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    }

    // 2. 切換頁面
    function switchView(id, el) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
      el.classList.add('active');
      if(id === 'map') setTimeout(() => map.invalidateSize(), 100);
    }

    // 3. 資料載入與地標渲染
    window.onload = async () => {
      initMap();
      const res = await fetch(`${GAS}?action=getData`);
      const data = await res.json();

      // 渲染紅色地標 (Location)
      data.memories.forEach(m => {
        // 使用紅色圖示
        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const marker = L.marker([m[1], m[2]], { icon: redIcon }).addTo(map);
        marker.bindPopup(`
            <div style="color:#000; width:200px;">
                <img src="${m[4]}" style="width:100%; border-radius:10px; margin-bottom:8px;">
                <b style="font-size:14px;">${m[0]}</b>
                <p style="font-size:12px; color:#666; margin-top:4px;">${m[3]}</p>
            </div>
        `);
      });

      // 渲染服務
      document.getElementById('service-list').innerHTML = data.services.map(s => `
        <div class="wallet-pass" onclick="redeem('${s[0]}')">
          <div class="flex justify-between items-start">
            <h4 class="font-black text-xl">${s[1]}</h4>
            <span class="text-indigo-600 font-bold">${s[4]}次</span>
          </div>
          <p class="text-xs text-gray-400 mt-2">${s[2]}</p>
        </div>`).join('');
    };

    // --- 各項功能實作 ---
    async function sos(msg) {
        await fetch(`${GAS}?action=redeem&id=SOS&msg=${encodeURIComponent(msg)}`);
        alert('指令發送成功！');
    }

    function requestMotionPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(state => { if (state === 'granted') startMotion(); });
        } else { startMotion(); }
    }

    function startMotion() {
        document.getElementById('motion-status').innerText = "連線成功：請揮動手機";
        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            if (Math.abs(acc.x) + Math.abs(acc.y) > 12) { if(audio.paused) audio.play(); }
            else { setTimeout(() => audio.pause(), 1500); }
        });
    }

    async function startGacha() {
        const overlay = document.getElementById('gacha-overlay');
        overlay.style.display = 'flex';
        gsap.to("#gacha-cube", { rotation: 20, x: 10, duration: 0.1, repeat: 10, yoyo: true });
        
        const res = await fetch(`${GAS}?action=gacha`);
        const data = await res.json();
        
        document.getElementById('gacha-result').innerText = "恭喜獲得：\n" + data.title;
        gsap.to("#gacha-result", { opacity: 1, y: -20, delay: 0.5 });
    }

    async function redeem(id) {
        if(!confirm('確認兌換？')) return;
        const res = await fetch(`${GAS}?action=redeem&id=${id}`);
        if(await res.text() === 'SUCCESS') { alert('兌換成功！'); location.reload(); }
    }
  </script>
</body>
</html>
