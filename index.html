<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MOM'S JUBILEE | v3.0 Ultra</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root { --p: #7C3AED; --s: #F472B6; --bg: #0F172A; }
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }
    
    /* 動態漸層背景 */
    .bg-gradient-anim {
      position: fixed; inset: 0;
      background: linear-gradient(125deg, #0F172A 0%, #1E293B 50%, #020617 100%);
      background-size: 200% 200%; animation: gradientBg 15s ease infinite; z-index: -1;
    }
    @keyframes gradientBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* 高級毛玻璃 2.0 */
    .glass {
      background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    
    /* 霓虹燈效果 */
    .neon-border { border: 1px solid rgba(124, 58, 237, 0.5); box-shadow: 0 0 15px rgba(124, 58, 237, 0.3); }

    /* Swiper 客製化 */
    .swiper { width: 100%; height: 100vh; padding-top: 100px; padding-bottom: 120px; }
    .swiper-slide { background-position: center; background-size: cover; width: 85%; height: auto; display: flex; justify-content: center; align-items: center; }

    /* 3D 翻轉卡片 */
    .flip-card { perspective: 1000px; width: 100%; height: 45vh; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; border-radius: 32px; -webkit-backface-visibility: hidden; backface-visibility: hidden; overflow: hidden; }
    .flip-card-back { transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }

    /* 沈浸式地圖背景 */
    #map-bg { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.15; filter: grayscale(100%) invert(100%); transition: 0.5s; }
    
    /* 圓形進度按鈕 (用於兌換) */
    .progress-btn { position: relative; width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; items-center; justify-center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .progress-btn:active { transform: scale(0.9); background: rgba(124, 58, 237, 0.2); border-color: var(--p); }
    .progress-btn svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .progress-btn circle { fill: none; stroke: var(--p); stroke-width: 3; stroke-dasharray: 157; stroke-dashoffset: 157; transition: stroke-dashoffset 0.1s linear; }

    /* 隱藏入口提示 */
    #secret-bar { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.01); z-index: 2000; cursor: pointer; }
  </style>
</head>
<body class="overflow-hidden">

  <div class="bg-gradient-anim"></div>
  <div id="map-bg"></div> <div id="splash" class="fixed inset-0 bg-slate-950 z-[9999] flex flex-col items-center justify-center p-10 text-center">
    <div id="owl-logo" class="text-8xl mb-8 animate-pulse">🦉</div>
    <div class="w-full max-w-sm h-1.5 bg-slate-800 rounded-full overflow-hidden">
        <div id="load-bar" class="h-full bg-gradient-to-r from-violet-600 to-pink-500 w-0"></div>
    </div>
    <p class="mt-6 text-slate-500 text-sm font-bold tracking-[0.3em] uppercase animate__animated animate__fadeIn">Authenticating Mom OS...</p>
  </div>

  <div id="secret-bar" onclick="unlock()"></div>

  <main id="app-content" class="opacity-0 scale-95 transition-all duration-700 h-screen w-screen relative">
    
    <header class="fixed top-0 left-0 w-full px-8 pt-12 pb-6 flex justify-between items-end z-50">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tighter text-white">Mom's Jubilee</h1>
        <p class="text-[11px] text-pink-400 font-bold uppercase tracking-[0.2em] mt-1">2026.04.06 Special Edition</p>
      </div>
      <div class="w-10 h-10 glass rounded-xl flex items-center justify-center text-lg neon-border">🦉</div>
    </header>

    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        
        <div class="swiper-slide">
          <div class="w-full h-full flex flex-col p-4">
            <h2 class="text-xl font-bold mb-6 text-indigo-300"># 時光航道</h2>
            <div id="memory-cards" class="space-y-6">
                <div class="flip-card glass rounded-3xl p-2 neon-border" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <img id="cur-img" src="" class="w-full h-full object-cover rounded-3xl">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent p-6 flex flex-col justify-end">
                                <h4 id="cur-title" class="font-bold text-xl text-white"></h4>
                            </div>
                        </div>
                        <div class="flip-card-back glass">
                            <p id="cur-desc" class="text-white text-sm leading-relaxed italic"></p>
                        </div>
                    </div>
                </div>
                <div class="text-center text-xs text-slate-500 mt-4 tracking-widest">點擊卡片翻轉 ・ 滑動切換模式</div>
            </div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="w-full h-full flex flex-col p-4">
            <h2 class="text-xl font-bold mb-6 text-pink-300"># 皇家指令端</h2>
            <div id="service-list" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                </div>
          </div>
        </div>

        <div class="swiper-slide">
          <div class="w-full h-full flex flex-col p-4">
            <h2 class="text-xl font-bold mb-6 text-orange-300"># 音律核心</h2>
            <div class="glass p-8 rounded-3xl neon-border flex flex-col items-center">
                <div class="w-40 h-40 rounded-full border-4 border-dashed border-orange-500/50 flex items-center justify-center text-7xl animate__animated animate__pulse animate__infinite">🎷</div>
                <h3 class="font-bold mt-8 text-white">Euphonium Solo</h3>
                <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Recorded by Your Son</p>
                <button class="mt-8 px-6 py-2 rounded-full glass neon-border text-orange-400 text-xs font-bold active:scale-95 transition-all">播放祝福</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    // 你指定的 GAS 連結
    const GAS = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';
    
    let mapBg;
    let swiper;
    let memoriesData = [];

    // 初始化地圖背景
    function initMapBg() {
      mapBg = L.map('map-bg', { zoomControl: false, attributionControl: false }).setView([23.8, 121], 7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(mapBg);
    }

    // 解鎖動畫
    function unlock() {
      gsap.to("#progress-unlock", { width: "100%", duration: 0.5 }); // 祕密滑塊功能省略
      unlockAnim();
    }
    
    function unlockAnim() {
        gsap.to("#splash", { y: "-100%", duration: 1, ease: "expo.inOut" });
        gsap.to("#app-content", { opacity: 1, scale: 1, duration: 1, delay: 0.3, ease: "power4.out" });
    }

    // 初始化 Swiper
    function initSwiper() {
      swiper = new Swiper(".mySwiper", {
        effect: "coverflow", grabCursor: true, centeredSlides: true,
        slidesPerView: "auto", loop: true,
        coverflowEffect: { rotate: 10, stretch: 0, depth: 100, modifier: 2, slideShadows: true },
        keyboard: true,
      });
      
      // 滑動時切換地圖背景與顏色 (Immersive Experience)
      swiper.on('slideChange', function () {
        const colors = ['#7C3AED', '#F472B6', '#F97316']; // 紫, 粉, 橘
        document.documentElement.style.setProperty('--p', colors[swiper.realIndex]);
        if(swiper.realIndex === 0 && memoriesData.length > 0) {
            updateMemoryCard(0); // 切換回回憶時重置卡片
        }
      });
    }

    // 更新回憶卡片內容
    function updateMemoryCard(idx) {
        const m = memoriesData[idx];
        document.getElementById('cur-img').src = m[4];
        document.getElementById('cur-title').innerText = m[0];
        document.getElementById('cur-desc').innerText = m[3];
        // 平滑移動地圖背景
        mapBg.panTo([m[1], m[2]], { animate: true, duration: 1 });
    }

    // 資料處理
    window.onload = async () => {
      initMapBg();
      initSwiper();

      // 模擬加載進度
      gsap.to("#load-bar", { width: "90%", duration: 2, ease: "power2.inOut" });

      try {
        const res = await fetch(`${GAS}?action=getData`);
        const data = await res.json();
        memoriesData = data.memories;

        // 初始化第一張回憶卡片
        if(memoriesData.length > 0) updateMemoryCard(0);

        // 渲染服務清單
        const list = document.getElementById('service-list');
        list.innerHTML = data.services.map(s => `
          <div class="glass p-5 rounded-3xl flex justify-between items-center neon-border transition-transform active:scale-95">
            <div>
              <h4 class="font-bold text-white text-base">${s[1]}</h4>
              <p class="text-[10px] text-pink-400 font-bold tracking-widest mt-1 uppercase">${s[2]}</p>
              <div class="mt-2 text-xs text-slate-500 font-mono">STOCK: ${s[4]}/${s[3]}</div>
            </div>
            <div class="progress-btn group" onclick="redeem('${s[0]}', this)">
              <svg width="56" height="56"><circle cx="28" cy="28" r="25" id="circ-${s[0]}" /></svg>
              <span class="text-xl group-active:scale-125 transition-transform">${s[4] > 0 ? '🎫' : '🚫'}</span>
            </div>
          </div>
        `).join('');

        // 資料抓取成功後，自動解鎖 (或者保留祕密滑塊)
        gsap.to("#load-bar", { width: "100%", duration: 0.5, onComplete: unlockAnim });

      } catch (e) {
        console.error(e);
        alert("資料庫連線超時，但我對妳的愛不超時。請檢查 GAS 部署權限。");
        unlockAnim(); // 壞掉也要讓媽媽進去
      }
    };

    // 兌換指令 (加上按鈕 Loading 動畫)
    async function redeem(id, el) {
      if(el.classList.contains('loading')) return;
      if (!confirm('確認執行皇家指令？兒子會收到 Line 通知。')) return;
      
      el.classList.add('loading');
      const circle = document.getElementById('circ-'+id);
      
      // 進度條動畫
      gsap.to(circle, { strokeDashoffset: 0, duration: 1.5, ease: "linear" });

      const resp = await fetch(`${GAS}?action=redeem&id=${id}`);
      const result = await resp.text();
      
      if (result === 'SUCCESS') {
        el.innerHTML = '<span class="text-2xl animate__animated animate__zoomIn">✨</span>';
        setTimeout(() => location.reload(), 2000);
      } else {
        alert('執行失敗，請重試。');
        gsap.set(circle, { strokeDashoffset: 157 }); // 重置
        el.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
