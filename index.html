<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOM OS | Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366F1; --accent: #F43F5E; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: #0F172A; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 1. 貓頭鷹管家懸浮窗 */
        #butler-menu { position: fixed; bottom: 100px; right: 24px; width: 200px; transform: scale(0); transform-origin: bottom right; z-index: 2000; }
        
        /* 2. 體感音樂視覺波形 */
        .music-bar { width: 4px; background: var(--primary); border-radius: 2px; transition: height 0.1s; }

        /* 3. 抽卡特效 */
        #gacha-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; }
        .gacha-box { width: 200px; height: 200px; background: linear-gradient(45deg, #FFD700, #FFA500); border-radius: 40px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); }
        
        /* 切換視圖 */
        .view { height: 100vh; width: 100vw; display: none; padding: 24px; padding-bottom: 120px; overflow-y: auto; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); height: 64px; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 32px; display: flex; gap: 20px; padding: 0 24px; align-items: center; z-index: 1000; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="gacha-overlay" class="flex flex-col items-center justify-center">
        <div id="gacha-cube" class="gacha-box flex items-center justify-center text-6xl">🎁</div>
        <h2 id="gacha-result" class="text-2xl font-bold mt-10 text-white opacity-0"></h2>
        <button id="close-gacha" class="mt-8 px-8 py-3 glass rounded-full opacity-0">收下禮物</button>
    </div>

    <main id="view-home" class="view active">
        <header class="pt-10 mb-8">
            <h1 class="text-4xl font-extrabold tracking-tighter">MOM OS <span class="text-indigo-400">v3.0</span></h1>
            <p class="text-xs text-slate-500 font-bold tracking-[0.3em] uppercase mt-2">Personal Service Terminal</p>
        </header>

        <div class="glass rounded-[32px] p-6 mb-6 overflow-hidden relative" onclick="requestMotionPermission()">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 class="font-bold text-lg">體感指揮模式</h3>
                    <p class="text-xs text-slate-400">揮動手機播放 Euphonium 獨奏</p>
                </div>
                <div class="text-2xl">🎷</div>
            </div>
            <div class="flex items-end justify-center gap-1 h-12" id="waveform">
                <div class="music-bar h-2"></div><div class="music-bar h-4"></div><div class="music-bar h-8"></div><div class="music-bar h-5"></div><div class="music-bar h-2"></div>
            </div>
            <p id="motion-status" class="text-[10px] text-center mt-4 text-indigo-400 font-bold uppercase tracking-widest">點擊開啟體感控制</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass rounded-[32px] p-6 flex flex-col items-center justify-center text-center border-2 border-indigo-500/30" onclick="startGacha()">
                <div class="text-4xl mb-2">🎰</div>
                <span class="text-xs font-bold uppercase tracking-widest">驚喜盲盒</span>
            </div>
            <div class="glass rounded-[32px] p-6 flex flex-col items-center justify-center text-center">
                <div class="text-4xl mb-2">📊</div>
                <span class="text-xs font-bold uppercase tracking-widest">系統狀態</span>
            </div>
        </div>
    </main>

    <div id="butler-fab" class="fixed bottom-[110px] right-6 w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-2xl shadow-xl shadow-indigo-500/40 z-[1999]" onclick="toggleButler()">🦉</div>
    
    <div id="butler-menu" class="glass rounded-3xl p-4 shadow-2xl">
        <h4 class="text-xs font-bold text-slate-400 mb-4 px-2 uppercase tracking-widest">快速指令</h4>
        <div class="space-y-2">
            <button onclick="sos('我餓了')" class="w-full py-3 text-left px-4 rounded-xl hover:bg-white/10 transition-all text-sm font-bold flex items-center gap-3">🍱 <span>我肚子餓了</span></button>
            <button onclick="sos('想喝飲料')" class="w-full py-3 text-left px-4 rounded-xl hover:bg-white/10 transition-all text-sm font-bold flex items-center gap-3">🥤 <span>想喝點東西</span></button>
            <button onclick="sos('召喚兒子')" class="w-full py-3 text-left px-4 rounded-xl hover:bg-white/10 transition-all text-sm font-bold flex items-center gap-3">👦 <span>召喚兒子</span></button>
        </div>
    </div>

    <audio id="bgm" src="你的音樂網址" loop></audio>

    <script>
        const GAS = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';
        const audio = document.getElementById('bgm');
        let isMotionActive = false;
        let lastX = 0, lastY = 0, lastZ = 0;

        // 1. 貓頭鷹管家 SOS 功能
        function toggleButler() {
            const menu = document.getElementById('butler-menu');
            const isActive = menu.style.transform === 'scale(1)';
            gsap.to(menu, { scale: isActive ? 0 : 1, duration: 0.4, ease: "back.out(1.7)" });
        }

        async function sos(msg) {
            if(!confirm(`確認發送「${msg}」給兒子？`)) return;
            toggleButler();
            await fetch(`${GAS}?action=redeem&id=SOS&msg=${encodeURIComponent(msg)}`);
            alert('訊息已送達！');
        }

        // 2. 體感指揮家邏輯
        function requestMotionPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') startMotion();
                });
            } else {
                startMotion();
            }
        }

        function startMotion() {
            isMotionActive = true;
            document.getElementById('motion-status').innerText = "指揮中：請揮動手機";
            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY);
                if (delta > 15) { // 揮動門檻值
                    if (audio.paused) audio.play();
                    animateWaveform();
                } else {
                    setTimeout(() => { if(delta < 2) audio.pause(); }, 1500);
                }
                lastX = acc.x; lastY = acc.y;
            });
        }

        function animateWaveform() {
            document.querySelectorAll('.music-bar').forEach(bar => {
                bar.style.height = Math.random() * 40 + 5 + 'px';
            });
        }

        // 3. 抽卡盲盒邏輯
        async function startGacha() {
            const overlay = document.getElementById('gacha-overlay');
            overlay.style.display = 'flex';
            
            // 搖晃動畫
            const tl = gsap.timeline();
            tl.to("#gacha-cube", { rotation: 10, x: 10, duration: 0.1, repeat: 10, yoyo: true })
              .to("#gacha-cube", { scale: 15, opacity: 0, duration: 0.5, ease: "expo.in" });

            try {
                const res = await fetch(`${GAS}?action=gacha`);
                const data = await res.json();
                
                document.getElementById('gacha-result').innerText = "恭喜獲得：\n" + data.title;
                gsap.to("#gacha-result", { opacity: 1, y: -20, delay: 0.5 });
                gsap.to("#close-gacha", { opacity: 1, delay: 0.8 });
                
                document.getElementById('close-gacha').onclick = () => {
                    location.reload();
                };
            } catch(e) {
                alert("盲盒空空如也（庫存不足）");
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
