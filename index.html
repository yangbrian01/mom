<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: 400px; width: 100%; border-radius: 15px; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-pink-50 min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <header class="text-center py-6">
      <h1 class="text-2xl font-bold text-pink-600">祝 最愛的媽媽 生日快樂 🎂</h1>
      <p class="text-gray-500 text-sm">時光足跡與皇家服務系統</p>
    </header>

    <section class="mb-8">
      <h2 class="text-lg font-semibold mb-3">📍 我們的回憶足跡</h2>
      <div id="map" class="shadow-lg"></div>
    </section>

    <section>
      <h2 class="text-lg font-semibold mb-3">🛎️ 皇家服務兌換</h2>
      <div id="service-list" class="space-y-4">
        </div>
    </section>
  </div>

  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-6 z-[1000]">
    <div class="bg-white p-4 rounded-2xl w-full max-w-sm relative">
      <button onclick="closeModal()" class="absolute -top-3 -right-3 bg-white rounded-full p-1 shadow">✕</button>
      <img id="modal-img" src="" class="w-full rounded-lg mb-3">
      <p id="modal-text" class="text-gray-700 italic"></p>
    </div>
  </div>

  <script>
    let map;
    
    window.onload = () => {
      // 初始化地圖 (預設定位在台灣或日本中心)
      map = L.map('map').setView([35.6895, 139.6917], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      // 抓取資料
      google.script.run.withSuccessHandler(renderApp).getData();
    };

    function renderApp(data) {
      // 渲染地圖標記
      data.memories.forEach(m => {
        L.marker([m[1], m[2]]).addTo(map)
          .on('click', () => showMemory(m[4], m[3]));
      });

      // 渲染服務項目
      const list = document.getElementById('service-list');
      data.services.forEach(s => {
        const card = `
          <div class="glass p-4 rounded-xl shadow-sm border border-pink-100 flex justify-between items-center">
            <div>
              <h3 class="font-bold text-gray-800">${s[1]}</h3>
              <p class="text-xs text-gray-500">${s[2]} (剩餘 ${s[4]} 次)</p>
            </div>
            <button onclick="redeemItem('${s[0]}')" 
              class="${s[4] > 0 ? 'bg-pink-500' : 'bg-gray-300'} text-white px-4 py-2 rounded-full text-sm">
              兌換
            </button>
          </div>
        `;
        list.innerHTML += card;
      });
    }

    function showMemory(img, text) {
      document.getElementById('modal-img').src = img;
      document.getElementById('modal-text').innerText = text;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function redeemItem(id) {
      if(confirm('確定要兌換這項皇家服務嗎？')) {
        google.script.run.withSuccessHandler(res => {
          if(res === 'SUCCESS') alert('兌換成功！兒子已收到通知！');
          location.reload();
        }).redeem(id);
      }
    }
  </script>
</body>
</html>
