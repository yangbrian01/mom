<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MOM'S EXCLUSIVE 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root { --primary: #4F46E5; --surface: #FFFFFF; --bg: #F2F4F7; }
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: var(--bg); color: #101828; overflow: hidden; }

    /* 全螢幕分頁容器 */
    .app-container { height: 100vh; width: 100vw; display: flex; transition: transform 0.5s cubic-bezier(0.3, 0, 0.2, 1); }
    .page { width: 100vw; height: 100vh; flex-shrink: 0; overflow-y: auto; padding-bottom: 100px; position: relative; }

    /* 底部導航：iOS 懸浮感 */
    .nav-bar {
      position: fixed; bottom: 24px; left: 24px; right: 24px; height: 64px;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
      border-radius: 32px; border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      display: flex; justify-content: space-around; align-items: center; z-index: 1000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; transition: 0.3s; width: 60px; }
    .nav-item.active { color: var(--primary); transform: translateY(-4px); }
    .nav-indicator { width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-top: 4px; opacity: 0; }
    .active .nav-indicator { opacity: 1; }

    /* 地圖客製化標記 */
    #map { height: 100%; width: 100%; border: none; }
    
    /* Bottom Sheet: iOS 地圖抽屜 */
    #bottom-sheet {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh;
      background: white; border-top-left-radius: 32px; border-top-right-radius: 32px;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 1100;
      transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
      padding: 24px;
    }
    #bottom-sheet.open { transform: translateY(0); }

    /* 骨架屏載入動畫 */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <div id="splash" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
    <div id="splash-logo" class="text-6xl mb-4">🦉</div>
    <div class="w-48 h-1 bg-gray-100 rounded-full overflow-hidden">
        <div id="splash-bar" class="h-full bg-indigo-600 w-0"></div>
    </div>
  </div>

  <div class="app-container" id="main-container">
    
    <div class="page p-6" id="page-home">
      <header class="flex justify-between items-end mb-8 pt-6">
        <div>
          <p class="text-xs font-bold text-indigo-500 tracking-[0.2em] uppercase mb-1">Station 2026</p>
          <h1 class="text-3xl font-extrabold tracking-tighter">愛妳喔，媽</h1>
        </div>
        <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-2xl border border-gray-100">🎂</div>
      </header>

      <div class="bg-indigo-600 rounded-[32px] p-6 text-white mb-6 shadow-xl shadow-indigo-100 overflow-hidden relative">
        <div class="relative z-10">
          <p class="text-xs opacity-80 uppercase tracking-widest mb-1">Status Report</p>
          <h2 class="text-2xl font-bold">今天妳最大！</h2>
          <div class="mt-8 flex items-center gap-4">
            <div class="bg-white/20 px-4 py-2 rounded-full text-xs font-bold backdrop-blur">2026.04.06</div>
            <div class="bg-white/20 px-4 py-2 rounded-full text-xs font-bold backdrop-blur">100% Energy</div>
          </div>
        </div>
        <div class="absolute -right-10 -bottom-10 text-9xl opacity-10 rotate-12">❤️</div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-white p-6 rounded-[28px] border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 font-bold mb-1">足跡景點</p>
          <p class="text-3xl font-black text-indigo-600" id="stat-memories">--</p>
        </div>
        <div class="bg-white p-6 rounded-[28px] border border-gray-100 shadow-sm">
          <p class="text-xs text-gray-400 font-bold mb-1">待兌換券</p>
          <p class="text-3xl font-black text-indigo-600" id="stat-services">--</p>
        </div>
      </div>

      <div class="bg-white p-6 rounded-[28px] border border-gray-100 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center text-xl text-orange-500">🎷</div>
        <div>
          <h4 class="font-bold text-sm">音樂會廣播</h4>
          <p class="text-xs text-gray-400">兒子錄製的 Euphonium 祝福音檔</p>
        </div>
      </div>
    </div>

    <div class="page p-0" id="page-map">
      <div id="map"></div>
      <div id="bottom-sheet">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeSheet()"></div>
        <div id="sheet-content">
            <h3 id="sheet-title" class="text-xl font-bold mb-2"></h3>
            <img id="sheet-img" src="" class="w-full h-40 object-cover rounded-2xl mb-4">
            <p id="sheet-desc" class="text-gray-500 text-sm leading-relaxed"></p>
        </div>
      </div>
    </div>

    <div class="page p-6" id="page-service">
      <h2 class="text-2xl font-extrabold mb-8 pt-6 tracking-tight">皇家服務中心</h2>
      <div id="service-list" class="space-y-4">
        </div>
    </div>

  </div>

  <nav class="nav-bar">
    <div class="nav-item active" onclick="gotoPage(0, this)">
      <span class="text-xl">🏠</span><span class="nav-label">總覽</span><div class="nav-indicator"></div>
    </div>
    <div class="nav-item" onclick="gotoPage(1, this)">
      <span class="text-xl">📍</span><span class="nav-label">足跡</span><div class="nav-indicator"></div>
    </div>
    <div class="nav-item" onclick="gotoPage(2, this)">
      <span class="text-xl">🎟️</span><span class="nav-label">服務</span><div class="nav-indicator"></div>
    </div>
  </nav>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';
    let map;

    // 分頁導航
    function gotoPage(index, el) {
      document.getElementById('main-container').style.transform = `translateX(-${index * 100}vw)`;
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      if(index === 1) setTimeout(() => map.invalidateSize(), 400);
      closeSheet();
    }

    // 地圖與資料處理
    window.onload = async () => {
      // Splash Anim
      gsap.to("#splash-bar", { width: "100%", duration: 1.2, ease: "power2.inOut", onComplete: () => {
        gsap.to("#splash", { y: "-100%", duration: 0.8, ease: "power4.inOut", delay: 0.2 });
      }});

      initMap();
      const resp = await fetch(`${GAS_URL}?action=getData`);
      const data = await resp.json();
      
      document.getElementById('stat-memories').innerText = data.memories.length;
      document.getElementById('stat-services').innerText = data.services.length;

      renderMapMarkers(data.memories);
      renderServices(data.services);
    };

    function initMap() {
      map = L.map('map', { zoomControl: false }).setView([23.8, 121], 7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function renderMapMarkers(memories) {
      memories.forEach(m => {
        const marker = L.circleMarker([m[1], m[2]], { color: '#4F46E5', radius: 8, fillOpacity: 0.8 }).addTo(map);
        marker.on('click', () => {
            document.getElementById('sheet-title').innerText = m[0];
            document.getElementById('sheet-img').src = m[4];
            document.getElementById('sheet-desc').innerText = m[3];
            document.getElementById('bottom-sheet').classList.add('open');
        });
      });
    }

    function closeSheet() { document.getElementById('bottom-sheet').classList.remove('open'); }

    function renderServices(services) {
      const list = document.getElementById('service-list');
      list.innerHTML = services.map(s => `
        <div class="bg-white p-5 rounded-[28px] border border-gray-100 flex justify-between items-center shadow-sm active:scale-95 transition-transform">
          <div>
            <h4 class="font-bold text-gray-900">${s[1]}</h4>
            <p class="text-[10px] text-gray-400 font-bold tracking-widest mt-1 uppercase">${s[2]}</p>
            <div class="mt-3 flex items-center gap-2">
                <div class="h-1.5 w-12 bg-gray-100 rounded-full">
                    <div class="h-full bg-indigo-500 rounded-full" style="width: ${(s[4]/s[3])*100}%"></div>
                </div>
                <span class="text-[10px] text-indigo-500 font-bold">${s[4]}/${s[3]}</span>
            </div>
          </div>
          <button id="btn-${s[0]}" onclick="redeem('${s[0]}')" 
            class="${s[4] > 0 ? 'bg-indigo-600' : 'bg-gray-200'} text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center transition-all">
            ${s[4] > 0 ? '✔️' : '🚫'}
          </button>
        </div>
      `).join('');
    }

    async function redeem(id) {
      const btn = document.getElementById('btn-' + id);
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
      
      const resp = await fetch(`${GAS_URL}?action=redeem&id=${id}`);
      const result = await resp.text();
      if (result === 'SUCCESS') {
        btn.innerHTML = '✨';
        btn.classList.replace('bg-indigo-600', 'bg-green-500');
        setTimeout(() => location.reload(), 1500);
      }
    }
  </script>
</body>
</html>
