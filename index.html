<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MOM'S SYSTEM 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root { --primary: #6366F1; --bg: #F8FAFC; }
    body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: var(--bg); overflow: hidden; }
    
    /* 分頁平移容器 */
    .app-container { height: 100vh; width: 300vw; display: flex; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .page { width: 100vw; height: 100vh; overflow-y: auto; padding-bottom: 120px; position: relative; }

    /* 懸浮導航欄 */
    .nav-bar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; height: 64px;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
      border-radius: 32px; border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      display: flex; justify-content: space-around; align-items: center; z-index: 1000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #94A3B8; transition: 0.3s; }
    .nav-item.active { color: var(--primary); transform: translateY(-4px); }

    /* 地圖抽屜 */
    #bottom-sheet {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 42vh;
      background: white; border-radius: 32px 32px 0 0;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 1100;
      transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.1, 1);
      padding: 24px;
    }
    #bottom-sheet.open { transform: translateY(0); }

    /* 背景音樂控制台卡片 */
    .music-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 24px; }
  </style>
</head>
<body>

  <div id="splash" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center">
    <div id="owl-logo" class="text-6xl mb-6">🦉</div>
    <div class="w-48 h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div id="load-bar" class="h-full bg-indigo-500 w-0"></div>
    </div>
    <p class="mt-4 text-slate-400 text-xs font-bold tracking-widest uppercase">System Initializing</p>
  </div>

  <div class="app-container" id="master-container">
    
    <div class="page p-6">
      <header class="flex justify-between items-center mb-8 pt-8">
        <div>
          <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter italic">HBD, Mom.</h1>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1 underline decoration-indigo-500 underline-offset-4">April 6, 2026</p>
        </div>
        <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-xl border border-slate-100">🎂</div>
      </header>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
          <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Memories</p>
          <p class="text-3xl font-black text-indigo-600" id="stat-m">--</p>
        </div>
        <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm">
          <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Vouchers</p>
          <p class="text-3xl font-black text-indigo-600" id="stat-s">--</p>
        </div>
      </div>

      <div class="music-card p-6 text-white mb-6 shadow-xl shadow-slate-200">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-2xl animate-pulse">🎷</div>
            <div>
                <h4 class="font-bold text-sm">Euphonium Solo</h4>
                <p class="text-[10px] opacity-50 uppercase tracking-widest">Recorded by Your Son</p>
            </div>
        </div>
        <div class="mt-6 h-1 w-full bg-white/10 rounded-full">
            <div class="h-full bg-indigo-400 w-2/3"></div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm leading-relaxed text-slate-600 italic text-sm">
        「媽，這是我用這幾年學到的技術親手寫的系統。謝謝妳一直支持我的音樂與夢想。這套 App 是妳的專屬管家，生日快樂！」
      </div>
    </div>

    <div class="page p-0">
      <div id="map" class="h-full w-full"></div>
      <div id="bottom-sheet">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6" onclick="closeSheet()"></div>
        <img id="m-img" src="" class="w-full h-44 object-cover rounded-2xl mb-4 bg-slate-100">
        <h3 id="m-title" class="text-xl font-bold text-slate-900 mb-1"></h3>
        <p id="m-desc" class="text-slate-500 text-sm leading-relaxed"></p>
      </div>
    </div>

    <div class="page p-6">
      <h2 class="text-2xl font-black mb-8 pt-8 tracking-tighter">皇家服務中心</h2>
      <div id="service-list" class="space-y-4">
          </div>
    </div>

  </div>

  <nav class="nav-bar">
    <div class="nav-item active" onclick="nav(0, this)">
      <span class="text-xl">🏠</span><span class="text-[9px] font-bold mt-1 uppercase">Home</span>
    </div>
    <div class="nav-item" onclick="nav(1, this)">
      <span class="text-xl">📍</span><span class="text-[9px] font-bold mt-1 uppercase">Travel</span>
    </div>
    <div class="nav-item" onclick="nav(2, this)">
      <span class="text-xl">🛎️</span><span class="text-[9px] font-bold mt-1 uppercase">Service</span>
    </div>
  </nav>

  <script>
    const GAS = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';
    let map;

    // 分頁導航
    function nav(idx, el) {
      document.getElementById('master-container').style.transform = `translateX(-${idx * 100}vw)`;
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      if(idx === 1) setTimeout(() => map.invalidateSize(), 300);
      closeSheet();
    }

    // 地圖詳情開啟/關閉
    function closeSheet() { document.getElementById('bottom-sheet').classList.remove('open'); }

    // 初始化地圖
    function initMap() {
      map = L.map('map', { zoomControl: false }).setView([24.8, 121], 7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    }

    window.onload = async () => {
      initMap();
      gsap.to("#load-bar", { width: "80%", duration: 1.5, ease: "power1.inOut" });

      try {
        const res = await fetch(`${GAS}?action=getData`);
        const data = await res.json();
        
        document.getElementById('stat-m').innerText = data.memories.length;
        document.getElementById('stat-s').innerText = data.services.length;

        // 渲染地圖標記
        data.memories.forEach(m => {
          const marker = L.circleMarker([m[1], m[2]], { color: '#6366F1', radius: 8, fillOpacity: 0.8 }).addTo(map);
          marker.on('click', () => {
            document.getElementById('m-title').innerText = m[0];
            document.getElementById('m-img').src = m[4];
            document.getElementById('m-desc').innerText = m[3];
            document.getElementById('bottom-sheet').classList.add('open');
          });
        });

        // 渲染服務卡片
        const list = document.getElementById('service-list');
        list.innerHTML = data.services.map(s => `
          <div class="bg-white p-5 rounded-[28px] border border-slate-100 flex justify-between items-center transition-transform active:scale-95">
            <div>
              <h4 class="font-bold text-slate-800">${s[1]}</h4>
              <p class="text-[10px] text-slate-400 font-bold tracking-widest mt-0.5 uppercase">${s[2]}</p>
              <div class="mt-3 flex items-center gap-1.5">
                  <div class="h-1 w-10 bg-slate-100 rounded-full"><div class="h-full bg-indigo-400 rounded-full" style="width:${(s[4]/s[3])*100}%"></div></div>
                  <span class="text-[9px] font-black text-slate-300 uppercase">${s[4]} LEFT</span>
              </div>
            </div>
            <button id="btn-${s[0]}" onclick="redeem('${s[0]}')" class="${s[4]>0?'bg-indigo-600 shadow-indigo-100':'bg-slate-200 shadow-none'} text-white w-12 h-12 rounded-2xl shadow-xl flex items-center justify-center transition-all">
              ${s[4]>0 ? '✔️' : '🚫'}
            </button>
          </div>
        `).join('');

        // 成功後解鎖
        gsap.to("#load-bar", { width: "100%", duration: 0.5, onComplete: () => {
            gsap.to("#splash", { y: "-100%", duration: 0.8, ease: "power4.inOut" });
        }});

      } catch (e) {
        alert("數據連線異常，請確認 GAS 部署權限是否設為『任何人』。");
        document.getElementById('splash').style.display = 'none';
      }
    };

    async function redeem(id) {
      const btn = document.getElementById('btn-'+id);
      const original = btn.innerHTML;
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
      
      const res = await fetch(`${GAS}?action=redeem&id=${id}`);
      const txt = await res.text();
      if(txt === 'SUCCESS') {
        btn.innerHTML = '✨';
        btn.classList.replace('bg-indigo-600', 'bg-green-500');
        setTimeout(() => location.reload(), 1500);
      } else {
        btn.innerHTML = original;
        alert("兌換失敗。");
      }
    }
  </script>
</body>
</html>
