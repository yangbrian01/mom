<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mom's Central Console 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --sidebar-w: 80px; /* 手機版窄側欄 */
      --accent: #D4AF37; /* 黃銅金 */
      --bg-main: #121212; /* 極致黑 */
      --card-bg: #1E1E1E;
    }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-main); color: #E0E0E0; margin: 0; overflow: hidden; }
    
    /* 側邊導航欄 */
    nav {
      width: var(--sidebar-w);
      height: 100vh;
      background: #0A0A0A;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      position: fixed;
      left: 0; top: 0; z-index: 100;
    }

    .nav-item {
      width: 45px; height: 45px;
      margin-bottom: 30px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.3s;
      color: #666;
    }
    .nav-item.active { background: var(--accent); color: white; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

    /* 主顯示區 */
    main {
      margin-left: var(--sidebar-w);
      height: 100vh;
      overflow-y: auto;
      padding: 40px;
      scroll-behavior: smooth;
    }

    .view-content { display: none; }
    .view-content.active { display: block; animation: fadeIn 0.5s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    #map { height: 60vh; border-radius: 20px; filter: invert(90%) hue-rotate(180deg) brightness(95%) contrast(90%); } /* 暗色系地圖 */

    /* 服務項目卡片 */
    .service-card {
      background: var(--card-bg);
      border-left: 4px solid var(--accent);
      transition: 0.3s;
    }
    .service-card:hover { transform: translateX(10px); background: #252525; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-item active" onclick="switchView('dashboard', this)">🏠</div>
    <div class="nav-item" onclick="switchView('map-view', this)">🗺️</div>
    <div class="nav-item" onclick="switchView('service-view', this)">🛎️</div>
    <div class="nav-item" onclick="switchView('music-view', this)">🎷</div>
    <div class="mt-auto mb-10 text-[10px] text-gray-700 rotate-90 whitespace-nowrap">MOM OS v2.6</div>
  </nav>

  <main>
    <div id="dashboard" class="view-content active">
      <h1 class="text-4xl font-bold mb-2 tracking-tighter">系統總覽 <span class="text-xs font-light text-gray-500">System Monitoring</span></h1>
      <div class="h-1 w-20 bg-amber-600 mb-10"></div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
        <div class="glass-card p-8 rounded-3xl bg-neutral-900 border border-neutral-800">
          <p class="text-sm text-gray-500 uppercase mb-2">主機狀態</p>
          <h2 class="text-2xl font-semibold">母后大人：生日快樂</h2>
          <p class="text-xs text-amber-500 mt-2">● 系統運作正常 - 2026.04.06</p>
        </div>
        <div class="glass-card p-8 rounded-3xl bg-neutral-900 border border-neutral-800">
          <p class="text-sm text-gray-500 uppercase mb-2">地理坐標</p>
          <h2 class="text-2xl font-semibold" id="recent-loc">等待數據輸入...</h2>
          <p class="text-xs text-gray-600 mt-2">Last Sync: Just now</p>
        </div>
      </div>

      <div class="p-6 bg-amber-900/20 border border-amber-900/30 rounded-2xl flex items-center gap-6">
        <div class="text-4xl">🦉</div>
        <div>
          <p class="text-sm italic text-amber-200">「嘿！我是妳的貓頭鷹助手。今天想要回顧哪一段旅程，或是要召喚兒子來服務？」</p>
        </div>
      </div>
    </div>

    <div id="map-view" class="view-content">
      <h1 class="text-4xl font-bold mb-10 tracking-tighter">時光航道 <span class="text-xs font-light text-gray-500">Memory Navigator</span></h1>
      <div id="map"></div>
    </div>

    <div id="service-view" class="view-content">
      <h1 class="text-4xl font-bold mb-10 tracking-tighter">皇家終端 <span class="text-xs font-light text-gray-500">Service Terminal</span></h1>
      <div id="service-list" class="grid gap-4 max-w-xl">
        </div>
    </div>

    <div id="music-view" class="view-content">
      <h1 class="text-4xl font-bold mb-10 tracking-tighter">音律祝福 <span class="text-xs font-light text-gray-500">Audio Stream</span></h1>
      <div class="bg-neutral-900 p-10 rounded-3xl border border-neutral-800 flex flex-col items-center">
        <div class="w-48 h-48 bg-amber-900/20 rounded-full mb-8 flex items-center justify-center border-4 border-amber-600 animate-pulse">
          <span class="text-6xl text-amber-600">🎷</span>
        </div>
        <h3 class="text-xl font-bold mb-2">兒子親自吹奏的 Euphonium</h3>
        <p class="text-gray-500 text-sm mb-6 italic">Recording for Mom's Birthday</p>
        <audio id="player" controls class="w-full max-w-sm"></audio>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxxknkKwWS-Vtqo3pKovAMstLtQrXeyD7DhnILzeeisIBCGHmh03zFjFAdmF47ZXtv_/exec';

    function switchView(viewId, el) {
      document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      el.classList.add('active');
      if(viewId === 'map-view') { setTimeout(() => map.invalidateSize(), 100); }
    }

    let map;
    window.onload = () => {
      map = L.map('map', { zoomControl: false }).setView([24.81, 121.03], 7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
      fetchData();
    };

    async function fetchData() {
      const resp = await fetch(`${GAS_URL}?action=getData`);
      const data = await resp.json();
      renderMap(data.memories);
      renderServices(data.services);
      if(data.memories.length > 0) document.getElementById('recent-loc').innerText = data.memories[0][0];
    }

    function renderMap(memories) {
      memories.forEach(m => {
        L.circleMarker([m[1], m[2]], { color: '#D4AF37', radius: 8, fillOpacity: 0.8 }).addTo(map)
          .bindPopup(`<b style="color:black">${m[0]}</b><br><img src="${m[4]}" width="150"><p style="color:black; font-size:12px">${m[3]}</p>`);
      });
    }

    function renderServices(services) {
      const list = document.getElementById('service-list');
      list.innerHTML = services.map(s => `
        <div class="service-card p-6 rounded-xl flex justify-between items-center">
          <div>
            <h4 class="font-bold text-lg text-amber-500">${s[1]}</h4>
            <p class="text-xs text-gray-400 mt-1">${s[2]}</p>
            <div class="mt-2 text-[10px] text-gray-600 font-mono">STOCK_STATUS: ${s[4]}/${s[3]}</div>
          </div>
          <button onclick="redeem('${s[0]}')" 
            class="${s[4] > 0 ? 'bg-amber-600' : 'bg-neutral-800'} text-white px-6 py-2 rounded-lg text-xs font-bold tracking-widest uppercase transition-all hover:bg-amber-500">
            ${s[4] > 0 ? 'Excute' : 'Inactive'}
          </button>
        </div>
      `).join('');
    }

    async function redeem(id) {
      if (!confirm('確認執行遠端指令？此動作將發送 Line 通知給兒子。')) return;
      const resp = await fetch(`${GAS_URL}?action=redeem&id=${id}`);
      const result = await resp.text();
      if (result === 'SUCCESS') {
        alert('指令已確認，Line 系統已發送通知。');
        fetchData();
      }
    }
  </script>
</body>
</html>
