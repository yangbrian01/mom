<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For Mom | 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root { --accent: #C5A47E; }
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #F2F2F7; color: #1C1C1E; -webkit-tap-highlight-color: transparent; }
    
    /* iOS 滾動條隱藏 */
    ::-webkit-scrollbar { display: none; }

    /* 全屏視圖管理 */
    .view-container { height: calc(100vh - 84px); overflow-y: auto; padding: 24px; display: none; }
    .view-container.active { display: block; animation: view-in 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes view-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* 底部導航欄 - 純 iOS 質感 */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 84px;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; z-index: 1000;
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; color: #8E8E93; transition: 0.2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 24px; margin-bottom: 4px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* 卡片設計 */
    .ios-card {
      background: white; border-radius: 20px; padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 16px;
    }
    .photo-stack { position: relative; height: 300px; width: 100%; perspective: 1000px; }
    .photo-card {
      position: absolute; width: 100%; height: 100%; border-radius: 20px;
      overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }
  </style>
</head>
<body>

  <div id="view-lock" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center p-10 text-center active:scale-95 transition-transform" onclick="unlock()">
    <div class="text-6xl mb-6">🕯️</div>
    <h2 class="text-2xl font-light tracking-widest mb-2">Mom's Secret</h2>
    <p class="text-gray-400 text-sm">Long press to reveal the heart</p>
    <div class="mt-20 w-12 h-1 bg-gray-100 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-orange-200 w-0"></div>
    </div>
  </div>

  <main id="app-content" class="opacity-0">
    
    <div class="px-6 pt-12 pb-4 flex justify-between items-end">
      <div>
        <h3 class="text-gray-400 text-sm font-medium uppercase tracking-tighter">Monday, April 6</h3>
        <h1 class="text-3xl font-bold">Happy Birthday</h1>
      </div>
      <div class="w-12 h-12 bg-gray-200 rounded-full overflow-hidden border-2 border-white shadow-sm">
        <img src="你的貓頭鷹貼圖網址" class="w-full h-full object-cover">
      </div>
    </div>

    <div id="tab-gallery" class="view-container active">
      <div class="photo-stack" id="stack">
        </div>
      <div class="mt-8 text-center text-gray-400 text-sm italic">點擊卡片切換下一張回憶</div>
    </div>

    <div id="tab-service" class="view-container">
      <h2 class="text-xl font-bold mb-6 px-2 text-stone-600">兒子服務兌換券</h2>
      <div id="service-list" class="space-y-4">
        </div>
    </div>

    <div id="tab-about" class="view-container">
      <div class="ios-card bg-stone-900 text-white">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-12 h-12 bg-amber-600 rounded-lg flex items-center justify-center text-2xl">🎷</div>
          <div>
            <p class="text-xs text-stone-400">Now Playing</p>
            <p class="font-bold">Euphonium Solo</p>
          </div>
        </div>
        <audio id="bgm" controls class="w-full h-10 opacity-50"></audio>
      </div>
      
      <div class="ios-card mt-6">
        <p class="text-lg leading-relaxed text-stone-600">
          媽，這是我為妳準備的專屬 App。<br><br>
          去年送妳自動化捷徑，今年送妳一整個系統。這裡記錄了我們去日本的點滴，還有我給妳的無限次服務承諾。<br><br>
          愛妳的兒子。
        </p>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('gallery', this)">
      <span class="nav-icon">🖼️</span><span class="nav-label">回憶</span>
    </div>
    <div class="nav-btn" onclick="switchTab('service', this)">
      <span class="nav-icon">🎫</span><span class="nav-label">兌換</span>
    </div>
    <div class="nav-btn" onclick="switchTab('about', this)">
      <span class="nav-icon">❤️</span><span class="nav-label">心意</span>
    </div>
  </nav>

  <script>
    const GAS_URL = '你的_GAS_網址';

    // 1. 解鎖動畫
    function unlock() {
      gsap.to("#progress", { width: "100%", duration: 0.8, onComplete: () => {
        gsap.to("#view-lock", { y: "-100%", duration: 0.6, ease: "power4.inOut" });
        gsap.to("#app-content", { opacity: 1, duration: 0.6 });
      }});
    }

    // 2. 切換標籤
    function switchTab(id, el) {
      document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      el.classList.add('active');
    }

    // 3. 抓取資料並渲染
    window.onload = async () => {
      const resp = await fetch(`${GAS_URL}?action=getData`);
      const data = await resp.json();
      
      // 渲染卡片堆疊
      const stack = document.getElementById('stack');
      data.memories.reverse().forEach((m, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.zIndex = i;
        card.style.transform = `translateY(${i * -10}px) scale(${1 - i * 0.05})`;
        card.innerHTML = `
          <img src="${m[4]}" class="w-full h-full object-cover">
          <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/80 to-transparent text-white">
            <h4 class="font-bold">${m[0]}</h4>
            <p class="text-xs opacity-80 mt-1">${m[3]}</p>
          </div>
        `;
        card.onclick = () => {
            gsap.to(card, { x: 500, rotation: 20, opacity: 0, duration: 0.5, onComplete: () => {
                stack.prepend(card); // 移到最下面實現循環
                gsap.set(card, { x: 0, rotation: 0, opacity: 1 });
                // 重新排 z-index (這裡省略簡化邏輯)
            }});
        };
        stack.appendChild(card);
      });

      // 渲染服務
      const list = document.getElementById('service-list');
      list.innerHTML = data.services.map(s => `
        <div class="ios-card flex justify-between items-center py-4">
          <div>
            <h4 class="font-bold text-lg">${s[1]}</h4>
            <p class="text-xs text-gray-400">${s[2]} (剩餘 ${s[4]} 次)</p>
          </div>
          <button onclick="redeem('${s[0]}')" 
            class="bg-stone-100 text-stone-600 px-6 py-2 rounded-full text-xs font-bold active:bg-stone-200 transition-colors">
            兌換
          </button>
        </div>
      `).join('');
    }

    async function redeem(id) {
      if (!confirm('確認使用這張兌換券嗎？')) return;
      const resp = await fetch(`${GAS_URL}?action=redeem&id=${id}`);
      const result = await resp.text();
      if (result === 'SUCCESS') alert('已發送通知！請靜待兒子出動。');
      location.reload();
    }
  </script>
</body>
</html>
